<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>INFINITY AI</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- Infinity Background -->

<div class="infinity-bg"></div>

<!-- Floating Particles -->

<div id="particles"></div>

<!-- Main Container -->

<div class="container">

<!-- Header -->

<header>

<h1>
∞ INFINITY AI
</h1>

<p>
Future Is Infinite
</p>

</header>

<!-- Status Bar -->

<div class="status-bar">

<span id="clock">
00:00
</span>

<span id="battery">
Battery
</span>

<span id="network">
Online
</span>

</div>

<!-- AI Avatar -->

<div class="ai-avatar">

<div class="orb"></div>

</div>

<!-- Chat Box -->

<div
id="chatBox"
class="chat-box">

</div>

<!-- Input Area -->

<div class="input-area">

<textarea

id="userInput"

placeholder=
"Ask INFINITY AI..."

></textarea>

</div>

<!-- Buttons -->

<div class="button-area">

<button
id="micBtn">

🎤 Voice

</button>

<button
id="sendBtn">

🚀 Send

</button>

<button
id="stopBtn">

⏹ Stop

</button>

</div>

<script
src="app.js">

</script>

</body>

</html><!-- ========================= -->

<div class="mode-grid">

<button class="mode-btn">

</button>

<button class="mode-btn">

<button class="mode-btn">

</button>

<button class="mode-btn">

</button>

</div>

</div>

<!-- ========================= -->
<!-- LANGUAGE -->
<!-- ========================= -->

<div class="settings-box">

<h2>
Language
</h2>

<select id="language">

<option value="en-US">
English
</option>

<option value="hi-IN">
Hindi
</option>

<option value="bn-BD">
Bengali
</option>

<option value="ta-IN">

</option>

<option value="mr-IN">

</option>

<option value="gu-IN">

</option>

<option value="pa-IN">
Punjabi
</option>

<option value="ur-PK">
Urdu
</option>

</select>

</div>

<!-- ========================= -->
<!-- VOICE -->
<!-- ========================= -->

<div class="settings-box">

<h2>
Voice
</h2>

<select id="voiceSelect">

<option>
Loading Voices...
</option>

</select>

</div>

<!-- ========================= -->
<!-- SMART TOOLS -->
<!-- ========================= -->

<div class="tools-panel">

<button id="clearChat">

Clear Chat

</button>

<button id="copyChat">

Copy Chat

</button>

<button id="downloadChat">

Download Chat

</button>

<button id="shareChat">

Share Chat

</button>

</div>

<!-- ========================= -->

<div class="system-info">

<p>

</p>
